services:
  postgres:
    image: postgres:15-alpine
    container_name: titanhub-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-titanhub}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: titanhub-server
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:password123@postgres:5432/titanhub
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key}
    ports:
      - '3001:3001'
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
