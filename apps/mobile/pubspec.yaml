name: mobile
description: "Titanhub - ACG All-in-One Aggregation Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.3

  # Network
  dio: ^5.4.0

  # Database / Persistence
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20

  # Video / Media
  media_kit: ^1.1.10
  media_kit_video: ^1.1.10
  media_kit_libs_video: ^1.1.10

  # UI / Helpers
  cached_network_image: ^3.3.1
  flutter_hooks: ^0.21.0
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.16.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
