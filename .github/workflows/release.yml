name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-lint:
    name: Backend & Web Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Lint
        run: pnpm run lint

      - name: Install Playwright Browsers
        run: pnpm --filter titanhub-server exec playwright install --with-deps chromium

      - name: Run Backend Tests
        run: pnpm --filter titanhub-server test

      - name: Run Web Build (Typecheck)
        run: pnpm build

  build-android:
    name: Build Android APK
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Android platform & Get dependencies
        run: |
          cd apps/mobile
          flutter create --platforms=android .
          sed -i 's/android:label="titanhub"/android:label="Titanhub"/g' android/app/src/main/AndroidManifest.xml
          
          # Append JVM target compatibility overrides to force Java 11 for all plugin dependencies
          cat << 'EOF' >> android/build.gradle
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileOptions {
                              sourceCompatibility = JavaVersion.VERSION_11
                              targetCompatibility = JavaVersion.VERSION_11
                          }
                      }
                  }
                  project.tasks.matching { it.class.name.contains("KotlinCompile") }.configureEach {
                      kotlinOptions {
                          jvmTarget = "11"
                      }
                  }
              }
          }
          EOF

          # Limit Gradle memory to prevent OOM kills on CI runner
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "kotlin.incremental=false" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "kotlin.compiler.execution.strategy=in-process" >> android/gradle.properties

          flutter pub get
          flutter pub run flutter_launcher_icons -f flutter_launcher_icons_android.yaml
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: |
          cd apps/mobile
          flutter build apk --release --verbose

      - name: Rename APKs
        run: |
          cd apps/mobile/build/app/outputs/flutter-apk
          mv app-release.apk Titanhub-${{ github.ref_name || 'debug' }}-android.apk

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: apps/mobile/build/app/outputs/flutter-apk/Titanhub-*.apk

  build-windows:
    name: Build Windows App
    needs: test-and-lint
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Windows platform & Get dependencies
        shell: pwsh
        run: |
          cd apps/mobile
          flutter create --platforms=windows .
          (Get-Content windows/runner/main.cpp) -replace 'L"titanhub"', 'L"Titanhub"' | Out-File windows/runner/main.cpp -Encoding utf8
          (Get-Content windows/runner/CMakeLists.txt) -replace 'set\(BINARY_NAME "titanhub"\)', 'set(BINARY_NAME "Titanhub")' | Out-File windows/runner/CMakeLists.txt -Encoding utf8
          flutter pub get
          flutter pub run flutter_launcher_icons -f flutter_launcher_icons_windows.yaml
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: |
          cd apps/mobile
          flutter build windows --release

      - name: Compress Release Archive
        shell: pwsh
        run: |
          $ReleaseDir = "apps/mobile/build/windows/x64/runner/Release"
          Compress-Archive -Path "$ReleaseDir\*" -DestinationPath "apps/mobile/build/Titanhub-windows-${{ github.ref_name || 'debug' }}.zip" -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: apps/mobile/build/Titanhub-windows-*.zip

  build-ios:
    name: Build iOS IPA
    needs: test-and-lint
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create iOS platform & Get dependencies
        run: |
          cd apps/mobile
          flutter create --platforms=ios .
          sed -i '' 's/titanhub/Titanhub/g' ios/Runner/Info.plist || true
          flutter pub get
          flutter pub run flutter_launcher_icons -f flutter_launcher_icons_ios.yaml
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build iOS (No Sign)
        run: |
          cd apps/mobile
          flutter build ios --release --no-codesign

      - name: Package IPA (Unsigned Payload)
        run: |
          cd apps/mobile
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Titanhub-${{ github.ref_name || 'debug' }}-ios-unsigned.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: apps/mobile/build/ios/iphoneos/Titanhub-*.ipa

  publish-release:
    name: Publish Release to GitHub
    needs: [build-android, build-windows, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: release-artifacts

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-artifacts

      - name: Download iOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-build
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
